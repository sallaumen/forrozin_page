services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: forrozin
      POSTGRES_PASSWORD: forrozin
      POSTGRES_DB: forrozin_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forrozin"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
