# Lista Forrózin - Tatá
> v2 — Prévia em revisão (trabalho em progresso)

> 🚧 = passo que o Tatá ainda está treinando e consolidando no vocabulário

---

## Convenções da Notação

### Direção
- \`D\` = Direita / \`E\` = Esquerda / \`F\` = Frente / \`T\` = Trás

### Pé Duplo
- \`pd(ca-fr)\` = Calcanhar → Frente
- \`pd(fr-ca)\` = Frente → Calcanhar
- Pode aparecer antes ou depois da direção: \`pd(ca-fr)-D\`

### Saídas de Giros Paulistas
Todos os paulistas (GP, GPS, GPE) podem sair aberto ou fechado — sufixos opcionais:
- \`-A\` = Saída aberta / \`-F\` = Saída fechada / \`-PC\` = Saída pelas costas 🚧

### Repetições e Extras
- \`x2\`, \`x3\` = Número de repetições
- Ginga, pausas ou marcações entre parênteses: \`BF(ginga pausa 3)\`
- Sequências separadas por \`>\`: \`IV > SC-D > PU-D\`

---

## 1. Bases (B)

Movimentos essenciais, usados como ponto de partida para combinações.

- **BTR** — Base triangular
- **BF** — Base frontal
- **BFR** — Base frontal romântica (com arraste lateral e ginga suave)
- **BQ** — Base quadrada
- **BL** — Base lateral (com aberturas e variações)
- **BE** — Base estranha (base frontal com alternância frente/meio — permite saídas como GPE)

---

## 2. Sacadas (SC)

Movimento de interceptação de espaço ou de perna.

- **SC** — Sacada simples (transferência, pé por baixo, coxa)
- **SC-E** — Sacada de esquerda
- **SC-E-BA** — Sacada de esquerda a partir do balanço
- **SCxX** — Sacada múltipla

---

## 3. Sacada sem peso (SCSP)

> Obs técnica: a condução parte do abdômen e ombro, não do pé. Sempre com 4 tempos de footwork antes da saída em chassê.
> Antigo nome informal: CH (Chutinho) — obsoleto. Antigas siglas: SSP e SC-SP — padronizado para SCSP.

- **SCSP** — Sacada sem peso (saída em chassê)
- **SCSP-BE** — Com pézin esquerdo batendo 1, seguido de balanço para esquerda (footwork base 1)
- **SCSP-TE** — Seguido de trava de esquerda (footwork base 2)
- **SCSP(pdi)-ET-BE** — Finalização de pé direito para dentro, pé esquerdo por trás do direito, empurrando o direito para frente gerando um falso balanço esquerdo com pé direito
- **SCSP-TP** — Sacada sem peso com troca rápida pela direita antes do balanço esquerda
- **SCSP-MD** — Sacada sem peso, marca duplo com esquerda \`pd(ca-fr)-E\`, entra girando esquerda, sai com mão cruzada

---

## 4. Travas (TR)

Travamentos de perna, podem ter sacada ou não.

> Lembrar: em trava a perna do condutor vai à frente. O V da abertura entre os parceiros não pode ser muito grande.

- **TR-E** — Trava esquerda
- **TR-FS** — Trava frontal sem sacada
- **TR-FC** — Trava frontal com sacada
- **TR-P3** — Trava com pezinho no terceiro tempo
- **TR-ARM** — Trava armada
  > Mecânica: ambos jogam CDM para direita simultaneamente criando elástico. Na virada para esquerda, condutor cruza perna direita e conduzida cruza esquerda → trava para esquerda.
  > Saídas: GP, TRD
- **TR-ARM-PE** — Trava armada com pescada
  > Variação: após o elástico, condutor permanece no lado direito enquanto conduzida vai para esquerda → "roubo" do pé esquerdo dela com esquerdo do condutor.
  > Saídas: GP, TRD

---

## 5. Pescadas (PE)

PE é sempre uma finalização — não é um movimento de partida. A entrada é rápida, interceptando o movimento antes que ele se complete. A saída varia (pião, giro, abertura).

> Notação: PE-[perna do condutor]-[perna da conduzida]

- **PE-E-E** — Pescada esquerda-esquerda: fim de caminhada, perna esquerda do condutor prende esquerda dela antes de ela finalizar
- **PE-SC-E** — Pescada após sacada de esquerda: condutor fica de costas, pesca esquerda com esquerda (mesma mecânica da caminhada, entrada diferente)
- **PE(pd)** — Pescada com pé duplo (variação de entrada)
- **PE-D-D** — Pescada direita-direita 🚧

---

## 6. Caminhadas (CA)

Deslocamentos frontais, laterais ou diagonais.

> Lembrar: a conduzida vai levemente à frente em caminhada — diferente da trava. Uma diferença sutil.

- **CA-E** — Caminhada esquerda
- **CA-F** — Caminhada frontal (fim com balanço ou contorno)
  > Dica técnica: preferir 45° para a esquerda em vez de frontal — deixa a condução mais leve para a conduzida.
  > Saídas: PI, PI-INV (pode alternar PI-INV > CA-F > PI-INV > CA-F para efeito elegante)
- **CA-I** — Caminhada Itaúnas (condutor vai para trás)
  > Dica técnica: preferir condução pequena, especialmente em músicas rápidas. Condução grande é viável em músicas lentas.
- **CA-BF** — Caminhada/batida frontal com ou sem batida traseira em tempo duplo
- **CA-CT** — Caminhada com contorno
  > Condutor fica parado no meio da caminhada. Joga peso dela para frente, ela contorna na sua frente e pisa atrás com a esquerda. Retorno com intenção de sacada.
  > Entrada: via sacada ou caminhada frontal.
  > Saídas: SC, GP, TRD, TR, CA (qualquer permissão de sacada)
- **CA-TZ** — Caminhada cruzada com trava final
  > Caminhada esquerda onde o primeiro passo da perna direita vai por trás da esquerda, mantendo o movimento da conduzida, travando-a indo à esquerda enquanto avança perna direita, pisando juntos, abre ela para a direita e saca a perna direita dela, finalizando em trava.
  > Notação original: CA-(PD-BACK)-(TE-AD)-SD-(TR-FC)

---

## 7. Giro Paulista (GP)

Categoria própria — independente dos giros simples.

> Todos os paulistas podem sair aberto (-A) ou fechado (-F). Sufixo omitido quando a saída é livre.

- **GP** — Giro paulista base
- **GP-D** — Paulista duplo (enfeite da conduzida)
  > Ela faz 1,5 giro enquanto o condutor executa 5 passos rápidos (em vez de 3) para reencaixar. Saída sempre fechada (-F).
- **GPE** — Giro paulista estranho (entrada a partir da base estranha — BE)
- **GPS** — Giro paulista da sacada
- **P1** — Passo de giro a partir de abertura esquerda

### Entradas no GP
- A partir da dança aberta
- A partir do pião (giros ímpares: 1, 3, 5...)
- A partir do Pimba (via intenção de sacada)
- A partir da trava armada (TR-ARM)
- A partir do abraço lateral direito: puxar pela mão → GP-D-F

---

## 8. Inversão (IV)

Condutor gira a conduzida ao seu redor pela esquerda, mantendo-se no próprio eixo.

> Sequência de pés: esquerda atrás → direita avança para sentido oposto → esquerda à frente.
> A esquerda à frente gera naturalmente a intenção de sacada.
> Saídas: SC, CA, TR, GP, TRD e qualquer saída via intenção de sacada.
> Antigo nome: Facão (FA) — obsoleto.

- **IV-CT** — Finta pós-inversão
  > Após a IV, simula entrada em caminhada mas joga ela para pisar atrás, puxa de volta. Mesma mecânica do CA-CT, porém a condução é mais circular pela natureza da inversão.
  > Saídas: SC, GP, TRD, TR, CA (qualquer permissão de sacada)

---

## 9. Push n pull (PU)

- **PU** — Push n pull
- **PU-V** — Push n pull com final lateral em V
- **PU-E-T** — Push n pull com esquerda para trás (pós dissociação de abertura)

---

## 10. Dança aberta (DA)

Existem duas versões da dança aberta — do forró universitário e do forró roots. São distintas em mecânica e uso.

### DA-U — Dança aberta universitária
Abertura lateral com pé para trás. Origem no forró universitário.

- **DA-U-RE** — Repique universitário (base aberta de abertura): abertura com duas mãos, sacada de quadril

### DA-R — Dança aberta roots
Abertura para frente (sempre para frente), usando o quarto tempo do forró — mais rápida e menor que o Estranho, com aparência similar.

> A dança aberta roots ativa a intenção de trava via condução de mãos e braços firmes, abrindo as mesmas portas que a intenção de sacada.

Saídas da DA-R:
- CA (caminhada)
- TR (trava — qualquer variação)
- SCSP (todas as variações de sacada sem peso)
- Footwork em geral


---

## 11. Pião (PI)

Giro conjunto frente a frente. Pode ser inserido em qualquer momento da dança.

> Mecânica: eixo central formado pelo alinhamento espelhado das pernas — perna direita do condutor alinhada com perna direita da conduzida (frente a frente).
> Ciclo: 3 passos = 1 volta. Peso troca a cada ciclo.
> Regra do ímpar: saídas técnicas (ex: GP) só ficam com o pé correto em voltas ímpares (1, 3, 5...).

- **PI** — Pião horário (padrão)
- **PI-INV** — Pião anti-horário (invertido)
  > Pode ser combinado com caminhada frontal: PI-INV > CA-F > PI-INV > CA-F — efeito elegante.

### Entradas
- **PI-AL** — Entrada pós abertura (entrada inicial/didática)
- **PI-B** — Entrada a partir da base: segurar quando ela vai para trás, entrar quando ela volta ao centro
- **PI-G** — Entrada a partir de finais de giro
- **PI** — Genérico: qualquer momento da dança

Saídas comuns: GP, PE, TR-ARM, TRD

---

## 12. Giros (G)

Categoria secundária na dança atual.

### Giros simples
- **GS** — Giro simples
- **GS-TM** — Giro simples trocando de mão no alto
- **GS-AL** — Giro simples indo para abraço lateral grudado
- **GS-ALT** — Giro simples trocando ela de lado no abraço lateral
- **GS-CH** — Giro simples chuveirinho
- **GS-CHO** — Giro simples chuveirinho no ombro
- **GS-MC** — Giro simples com mão nas costas
- **GS-RCP** — Giro simples rocambole por pescoço (saída para paulista opcional)
- **GS-J-GPC** — Giro simples juntos (condutor logo depois do conduzido), saída para giro paulista de costas

### Giros de 5 pisadas
- **GM** — Manivela (5 pisadas)
- **GN** — Giro ninja (5 pisadas) 🚧
- **GPA** — Panamericano (5 pisadas, braço esquerdo)
- **GCH** — Giro chicote

---

## 13. Arrastes (AR)

- **ARD** — Arraste direita diagonal trás dela
- **ARD-TP** — Arraste direita diagonal trás dela com troca rápida pegando pé esquerdo dela
- **ARE** — Arraste esquerda diagonal trás dela
- **ARE-TP** — Arraste esquerda diagonal trás dela com troca rápida pegando pé direito dela

## 14. Mão nas costas (MC)

## 18. Outros movimentos

- **CHQ** — Chique-chique
  - **PMB** — Pimba (saída do CHQ)
    > Mecânica: condutor dá impulso frontal (encoxada) → conduzida recua com o corpo → volta para o lado esquerdo do condutor. Momento de tensão na dança.
    > Gatilho de saída: intenção de sacada. Saídas: GP, TRD, TR, CA
- **CHC** — Chique-chique carinhoso
- **TRD** — Trocadilho
  > Saída pós intenção de sacada — alternativa mais sutil ao GP, sem giro completo. Cruzamento de pernas encaixado: perna direita do condutor cruza por trás, perna direita da conduzida cruza pela frente.
  > Pode seguir diretamente de qualquer sacada, ou surgir no final de caminhadas que gerem intenção de sacada.
  > Entradas: SC, PMB, TR-ARM, CA-CT, IV-CT, intenção de sacada em geral

# 🧠 Conceitos Técnicos de Condução

*Princípios que explicam a lógica por trás dos movimentos — não são passos em si, mas ferramentas de compreensão e condução.*

---

### Intenção de sacada
Princípio de condução gerado pelo avanço da perna esquerda do condutor entre as pernas da conduzida — sem necessariamente completar a sacada. Abre múltiplas saídas a partir desse impulso direcional.

Gerada naturalmente em: IV (finalização), PMB, base (BF).
Saídas possíveis: SC, GP, TRD, TR, CA.
Exceção: SC-E (sacada de esquerda) tem mecânica própria.

---

### Elástico
Tensão bilateral criada quando ambos jogam o centro de massa na mesma direção simultaneamente, gerando energia para o movimento seguinte. Usado na TR-ARM como preparação para a trava.

function ForrozinApp() {
  const [openSections, setOpenSections] = useState({});
  const [search, setSearch] = useState("");
  const [filterCat, setFilterCat] = useState("all");
  const [page, setPage] = useState("home");

  const toggleSection = (id) => setOpenSections(prev => ({ ...prev, [id]: !prev[id] }));
  const expandAll = () => { const all = {}; SECTIONS.forEach(s => { all[s.id] = true; }); setOpenSections(all); };
  const collapseAll = () => setOpenSections({});

  const allItems = useMemo(() => {
    const items = [];
    SECTIONS.forEach(section => {
      if (section.items) section.items.forEach(item => items.push({ ...item, sectionId: section.id, category: section.category }));
      if (section.subsections) section.subsections.forEach(sub => { if (sub.items) sub.items.forEach(item => items.push({ ...item, sectionId: section.id, category: section.category })); });
    });
    return items;
  }, []);

  const filteredSections = useMemo(() => {
    if (!search && filterCat === "all") return SECTIONS;
    const q = search.toLowerCase();
    return SECTIONS.filter(section => {
      if (filterCat !== "all" && section.category !== filterCat) return false;
      if (!search) return true;
      if (section.title.toLowerCase().includes(q) || (section.code && section.code.toLowerCase().includes(q))) return true;
      const checkItems = (items) => items && items.some(i => i.code?.toLowerCase().includes(q) || i.name?.toLowerCase().includes(q) || i.note?.toLowerCase().includes(q));
      if (checkItems(section.items)) return true;
      if (section.subsections && section.subsections.some(sub => checkItems(sub.items))) return true;
      return false;
    });
  }, [search, filterCat]);

  const hl = (text) => {
    if (!search || !text) return text;
    const idx = text.toLowerCase().indexOf(search.toLowerCase());
    if (idx === -1) return text;
    return React.createElement("span", null, text.slice(0, idx), React.createElement("mark", { style: { background: "#d4a054", color: "#1a1108", borderRadius: 2, padding: "0 2px" } }, text.slice(idx, idx + search.length)), text.slice(idx + search.length));
  };

  const totalMoves = allItems.length;
  const wipMoves = allItems.filter(i => i.wip).length;
  const categories = [...new Set(SECTIONS.map(s => s.category))];

  const renderItem = (item) => {
    const hasImage = item.code && item.code.startsWith("HF-") && window.__FORRO_CARDS__ && window.__FORRO_CARDS__[item.code];
    return (
      <div key={item.code} style={{
        display: "flex", gap: 14, padding: "12px 0",
        borderBottom: "1px solid rgba(60,40,20,0.12)",
      }}>
        {hasImage && (
          <img src={window.__FORRO_CARDS__[item.code]} alt={item.code} style={{
            width: 80, height: 80, objectFit: "cover", borderRadius: 4,
            flexShrink: 0, border: "1px solid rgba(60,40,20,0.15)", filter: "sepia(20%)"
          }} />
        )}
        <div style={{ flex: 1 }}>
          <div style={{ display: "flex", alignItems: "baseline", gap: 10, flexWrap: "wrap" }}>
            {item.wip && <span style={{ fontSize: 11, color: "#c0741a", fontFamily: "Georgia, serif", fontStyle: "italic" }}>em treinamento</span>}
            <code style={{
              fontFamily: "'Courier New', monospace", fontSize: 12, fontWeight: 700,
              color: "#5c3a1a", background: "rgba(180,120,40,0.1)",
              padding: "2px 7px", borderRadius: 3, letterSpacing: 0.5,
              border: "1px solid rgba(180,120,40,0.2)"
            }}>{hl(item.code)}</code>
            <span style={{ fontSize: 14, color: "#2c1a0e", fontFamily: "Georgia, serif", lineHeight: 1.5 }}>
              {hl(item.name)}
            </span>
          </div>
          {item.note && (
            <p style={{ fontSize: 12, color: "#7a5c3a", margin: "5px 0 0", fontFamily: "Georgia, serif", fontStyle: "italic", lineHeight: 1.6 }}>
              {hl(item.note)}
            </p>
          )}
        </div>
      </div>
    );
  };

  const renderSection = (section) => {
    const isOpen = openSections[section.id];
    const color = CATEGORY_COLORS[section.category] || "#7f8c8d";
    return (
      <div key={section.id} style={{
        marginBottom: 8, borderRadius: 2,
        border: `1px solid ${isOpen ? "rgba(60,40,20,0.2)" : "rgba(60,40,20,0.1)"}`,
        background: isOpen ? "#fffef9" : "#fdfcf7",
        transition: "all 0.2s", overflow: "hidden",
      }}>
        <button onClick={() => toggleSection(section.id)} style={{
          width: "100%", background: "transparent", border: "none",
          cursor: "pointer", padding: "14px 20px",
          display: "flex", alignItems: "center", gap: 14, textAlign: "left",
        }}>
          <span style={{
            width: 20, height: 20, display: "flex", alignItems: "center", justifyContent: "center",
            transform: isOpen ? "rotate(90deg)" : "rotate(0deg)",
            transition: "transform 0.2s", color: color, fontSize: 10, flexShrink: 0
          }}>▶</span>
          <div style={{ flex: 1, display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
            {section.num && (
              <span style={{ fontSize: 11, color: "#aaa", fontFamily: "Georgia, serif", fontStyle: "italic" }}>
                {section.num}.
              </span>
            )}
            {section.code && (
              <code style={{
                fontSize: 11, color: color, fontFamily: "'Courier New', monospace",
                background: `${color}15`, padding: "2px 8px", borderRadius: 3,
                border: `1px solid ${color}30`, letterSpacing: 0.5
              }}>{section.code}</code>
            )}
            <span style={{ fontSize: 15, fontWeight: 700, color: "#1a0e05", fontFamily: "Georgia, serif", letterSpacing: -0.2 }}>
              {section.title}
            </span>
            <span style={{
              fontSize: 10, color: color, background: `${color}15`,
              padding: "1px 8px", borderRadius: 10, fontFamily: "Georgia, serif",
              fontStyle: "italic", border: `1px solid ${color}25`
            }}>{CATEGORY_LABELS[section.category]}</span>
          </div>
        </button>
        {isOpen && (
          <div style={{ padding: "4px 24px 20px 54px" }}>
            {section.description && (
              <p style={{ fontSize: 13, color: "#7a5c3a", fontFamily: "Georgia, serif", fontStyle: "italic", marginBottom: 12, lineHeight: 1.7 }}>
                {section.description}
              </p>
            )}
            {section.note && (
              <div style={{
                fontSize: 12, color: "#5c3a1a", background: "rgba(212,160,84,0.1)",
                border: "1px solid rgba(212,160,84,0.3)", borderLeft: "3px solid #d4a054",
                borderRadius: "0 4px 4px 0", padding: "8px 14px", margin: "0 0 14px",
                fontFamily: "Georgia, serif", fontStyle: "italic", lineHeight: 1.7
              }}>
                {section.note}
              </div>
            )}
            {section.items && section.items.map(renderItem)}
            {section.subsections && section.subsections.map(sub => (
              <div key={sub.title} style={{ marginTop: 16 }}>
                <div style={{
                  fontSize: 10, fontWeight: 700, color: "#9a7a5a", fontFamily: "Georgia, serif",
                  textTransform: "uppercase", letterSpacing: 2, marginBottom: 10,
                  paddingBottom: 6, borderBottom: "1px solid rgba(60,40,20,0.1)"
                }}>{sub.title}</div>
                {sub.note && <p style={{ fontSize: 12, color: "#7a5c3a", fontFamily: "Georgia, serif", fontStyle: "italic", marginBottom: 10 }}>{sub.note}</p>}
                {sub.items && sub.items.map(renderItem)}
              </div>
            ))}
          </div>
        )}
      </div>
    );
  };

  if (page === "about") {
    return (
      <div style={{ minHeight: "100vh", background: "#f7f3ec", fontFamily: "Georgia, serif" }}>
        <Header page={page} setPage={setPage} />
        <div style={{ maxWidth: 620, margin: "0 auto", padding: "80px 24px" }}>
          <div style={{ borderBottom: "2px solid #2c1a0e", paddingBottom: 8, marginBottom: 40 }}>
            <p style={{ fontSize: 11, letterSpacing: 3, color: "#9a7a5a", textTransform: "uppercase", marginBottom: 8 }}>Autor</p>
            <h1 style={{ fontSize: 42, fontWeight: 700, color: "#1a0e05", letterSpacing: -1, margin: 0 }}>L. Tavano</h1>
          </div>
          <p style={{ fontSize: 17, lineHeight: 1.9, color: "#3a2410", marginBottom: 32 }}>
            Esta enciclopédia nasceu de uma necessidade simples: não perder o que a dança ensina. Cada passo anotado aqui foi vivido no chão de dança, construído em parceria com músicas e parceiras, refinado pela repetição e pela escuta.
          </p>
          <p style={{ fontSize: 17, lineHeight: 1.9, color: "#3a2410", marginBottom: 48 }}>
            O forró roots é uma conversa de corpos. Este documento é a tentativa de colocar essa conversa em palavras — sabendo que a palavra sempre vai ficar devendo para o movimento.
          </p>
          <div style={{ borderTop: "1px solid rgba(60,40,20,0.15)", paddingTop: 40 }}>
            <p style={{ fontSize: 11, letterSpacing: 3, color: "#9a7a5a", textTransform: "uppercase", marginBottom: 24 }}>Contato</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              <a href={"mailto:" + AUTHOR.email} style={{
                display: "flex", alignItems: "center", gap: 14, textDecoration: "none",
                padding: "16px 20px", border: "1px solid rgba(60,40,20,0.15)",
                borderRadius: 4, background: "#fffef9", transition: "border-color 0.2s",
              }}>
                <span style={{ fontSize: 20 }}>✉️</span>
                <div>
                  <div style={{ fontSize: 11, color: "#9a7a5a", letterSpacing: 1, textTransform: "uppercase", marginBottom: 2 }}>Email</div>
                  <div style={{ fontSize: 14, color: "#2c1a0e" }}>{AUTHOR.email}</div>
                </div>
              </a>
              <a href={AUTHOR.instagramUrl} target="_blank" rel="noreferrer" style={{
                display: "flex", alignItems: "center", gap: 14, textDecoration: "none",
                padding: "16px 20px", border: "1px solid rgba(60,40,20,0.15)",
                borderRadius: 4, background: "#fffef9",
              }}>
                <span style={{ fontSize: 20 }}>📸</span>
                <div>
                  <div style={{ fontSize: 11, color: "#9a7a5a", letterSpacing: 1, textTransform: "uppercase", marginBottom: 2 }}>Instagram</div>
                  <div style={{ fontSize: 14, color: "#2c1a0e" }}>{AUTHOR.instagram}</div>
                </div>
              </a>
            </div>
          </div>
          <div style={{ marginTop: 60, paddingTop: 32, borderTop: "1px solid rgba(60,40,20,0.1)", textAlign: "center" }}>
            <p style={{ fontSize: 11, color: "#bba88a", letterSpacing: 1 }}>
              Forrózin do Tavano · Forró Roots · {new Date().getFullYear()}
            </p>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: "#f7f3ec", fontFamily: "Georgia, serif" }}>
      <Header page={page} setPage={setPage} />

      {/* Hero */}
      <div style={{
        borderBottom: "1px solid rgba(60,40,20,0.12)",
        padding: "48px 24px 36px", background: "#f2ede4",
      }}>
        <div style={{ maxWidth: 860, margin: "0 auto" }}>
          <p style={{ fontSize: 11, letterSpacing: 3, color: "#9a7a5a", textTransform: "uppercase", marginBottom: 12 }}>Enciclopédia Pessoal · Forró Roots</p>
          <h1 style={{
            fontSize: 48, fontWeight: 700, color: "#1a0e05",
            letterSpacing: -1.5, margin: "0 0 10px", lineHeight: 1.1
          }}>Forrózin<br />do Tatá</h1>
          <p style={{ fontSize: 14, color: "#7a5c3a", fontStyle: "italic", marginBottom: 24, lineHeight: 1.7, maxWidth: 480 }}>
            {AUTHOR.bio}
          </p>
          <div style={{ display: "flex", gap: 20, fontSize: 12, color: "#9a7a5a" }}>
            <span><strong style={{ color: "#2c1a0e" }}>{totalMoves}</strong> movimentos</span>
            <span>·</span>
            <span><strong style={{ color: "#c0741a" }}>{wipMoves}</strong> em treinamento</span>
            <span>·</span>
            <span>v2</span>
          </div>
        </div>
      </div>

      {/* Controls */}
      <div style={{
        position: "sticky", top: 0, zIndex: 100,
        background: "rgba(242,237,228,0.97)", backdropFilter: "blur(8px)",
        borderBottom: "1px solid rgba(60,40,20,0.12)", padding: "14px 24px",
      }}>
        <div style={{ maxWidth: 860, margin: "0 auto", display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" }}>
          <div style={{ position: "relative", flex: 1, minWidth: 200 }}>
            <span style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", color: "#9a7a5a", fontSize: 13 }}>⌕</span>

              placeholder="Buscar por sigla, nome..."
              style={{
                width: "100%", background: "#fffef9", border: "1px solid rgba(60,40,20,0.2)",
                borderRadius: 4, padding: "8px 12px 8px 32px", color: "#2c1a0e",
                fontSize: 13, outline: "none", fontFamily: "Georgia, serif", boxSizing: "border-box"
              }} />
          </div>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            {["all", ...categories].map(cat => (
              <button key={cat} onClick={() => setFilterCat(cat === filterCat && cat !== "all" ? "all" : cat)} style={{

                fontFamily: "Georgia, serif", fontStyle: "italic", letterSpacing: 0.3,
                background: filterCat === cat ? (cat === "all" ? "#2c1a0e" : CATEGORY_COLORS[cat]) : "rgba(60,40,20,0.06)",
                color: filterCat === cat ? "#f7f3ec" : "#7a5c3a",
                border: `1px solid ${filterCat === cat ? "transparent" : "rgba(60,40,20,0.15)"}`,
                fontWeight: filterCat === cat ? 700 : 400,
              }}>{cat === "all" ? "Todos" : CATEGORY_LABELS[cat]}</button>
            ))}
          </div>
          <div style={{ display: "flex", gap: 6, marginLeft: "auto" }}>
            <button onClick={expandAll} style={{ fontSize: 10, padding: "5px 10px", borderRadius: 3, cursor: "pointer", background: "transparent", border: "1px solid rgba(60,40,20,0.2)", color: "#7a5c3a", fontFamily: "Georgia, serif" }}>+ expandir</button>
            <button onClick={collapseAll} style={{ fontSize: 10, padding: "5px 10px", borderRadius: 3, cursor: "pointer", background: "transparent", border: "1px solid rgba(60,40,20,0.2)", color: "#7a5c3a", fontFamily: "Georgia, serif" }}>− fechar</button>
          </div>
        </div>
      </div>

      <div style={{ maxWidth: 860, margin: "0 auto", padding: "24px 16px 80px" }}>

        background: "none", border: "none", cursor: "pointer"
      }}>Forrózin 🪗</button>
      <nav style={{ display: "flex", gap: 28 }}>
        {[["home", "Movimentos"], ["about", "Autor & Contato"]].map(([p, label]) => (
          <button key={p} onClick={() => setPage(p)} style={{
            fontFamily: "Georgia, serif", fontSize: 12, letterSpacing: 1,
            color: page === p ? "#d4a054" : "#bba88a",
            background: "none", border: "none", cursor: "pointer",
            fontWeight: page === p ? 700 : 400,
            borderBottom: page === p ? "1px solid #d4a054" : "none",
            paddingBottom: 2,
          }}>{label}</button>
        ))}
      </nav>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(ForrozinApp));
  </script>
</body>
</html>
