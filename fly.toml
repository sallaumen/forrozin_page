# fly.toml app configuration file generated for o-grupo-de-estudos on 2026-04-16T10:38:30-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'o-grupo-de-estudos'
primary_region = 'gru'
kill_signal = 'SIGTERM'

[build]

[deploy]
  release_command = '/app/bin/migrate'
  strategy = 'rolling'
  wait_timeout = '5m'

[env]
  PHX_HOST = 'ogrupodeestudos.com.br'
  PHX_EXTRA_HOSTS = 'www.ogrupodeestudos.com.br,o-grupo-de-estudos.fly.dev'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 1000

  [[http_service.checks]]
    grace_period = '30s'
    interval = '30s'
    method = 'GET'
    timeout = '5s'
    path = '/healthz'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
