name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:

env:
  MIX_ENV: test

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: forrozin
          POSTGRES_PASSWORD: forrozin
          POSTGRES_DB: o_grupo_de_estudos_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27.3"
          elixir-version: "1.19.5-otp-27"

      - name: Restore deps/build cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      # Retry once: re-runs only the tests that failed. A known concurrency
      # flake (async tests inserting the same unique step code "BF" deadlock)
      # passes on retry; a real failure persists. Root fix tracked in the plan.
      - name: Run tests (retry flaky once)
        run: mix test || mix test --failed

  lint:
    name: Lint & Security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27.3"
          elixir-version: "1.19.5-otp-27"

      - name: Restore deps/build cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Format, audit, sobelow, credo
        run: mix lint
